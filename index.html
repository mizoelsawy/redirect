<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download GetStenix</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      text-align: center;
      padding: 20px;
    }
    .container { max-width: 420px; }
    .loader {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p { font-size: 15px; color: #94a3b8; margin-bottom: 32px; }
    .buttons { display: flex; flex-direction: column; gap: 14px; }
    a.btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 14px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px; font-weight: 600;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    a.btn:active { transform: scale(0.97); }
    .btn-ios {
      background: #fff; color: #0f172a;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
    .btn-android {
      background: #34d399; color: #0f172a;
      box-shadow: 0 4px 14px rgba(52,211,153,0.3);
    }
    .btn svg { width: 24px; height: 24px; flex-shrink: 0; }
  </style>
  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var iOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var android = /android/i.test(ua);

      var iosURL = "https://apps.apple.com/eg/app/getstenix/id6741886235?l=ar";
      var androidURL = "https://play.google.com/store/apps/details?id=com.getstenix_front&hl=en";

      if (iOS) {
        window.location.href = iosURL;
      } else if (android) {
        window.location.href = androidURL;
      }
      // Desktop / unknown → show both buttons (handled in HTML below)
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="loader"></div>
    <h1>Download GetStenix</h1>
    <p>Redirecting you to the store…<br>If nothing happens, choose your platform:</p>
    <div class="buttons">

        App Store
      </a>
      <a class="btn btn-android" href="https://play.google.com/store/apps/details?id=com.getstenix_front&hl=en">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.04L14.47 12 3.18.96a1.06 1.06 0 0 0-.18.6v20.88c0 .22.06.42.18.6zm1.44.9l12.63-7.3-2.78-2.55L4.62 23.94zM20.35 11.1l-3.28-1.9-3.03 2.8 3.03 2.8 3.28-1.9c.6-.35.97-.99.97-1.4s-.37-1.05-.97-1.4zm-5.73-3.32L4.62.06l9.85 9.85 2.78-2.55-2.63-1.58z"/></svg>

</body>
</html>
